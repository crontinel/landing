<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy circle background -->
  <circle cx="32" cy="32" r="30" fill="#1F3B5E"/>

  <!-- Outer ring: left cyan arc + right muted arc, both r=27 stroke=5.5 -->
  <!-- Cyan arc: from 180° (left) around through bottom to ~30° (top-right) -->
  <path d="M32 5 A27 27 0 1 0 55 17" fill="none" stroke="#5CE1E6" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Muted slate arc on right side -->
  <path d="M55 17 A27 27 0 0 0 32 5" fill="none" stroke="#5E6F98" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Gear teeth: 7 rounded notches on the outer cyan edge, evenly spaced on left arc -->
  <!-- Each tooth: 4x4 rounded rect, placed at r=30 from center, 30° apart from 180° to 360° -->
  <g fill="#5CE1E6">
    <!-- 180° (left) -->
    <rect x="30" y="1" width="4" height="5" rx="2"/>
    <!-- 210° -->
    <rect x="18.7" y="3.5" width="4" height="5" rx="2" transform="rotate(30 32 32)"/>
    <!-- 240° -->
    <rect x="9.7" y="14.7" width="4" height="5" rx="2" transform="rotate(60 32 32)"/>
    <!-- 270° (bottom) -->
    <rect x="5" y="30" width="5" height="4" rx="2" transform="rotate(90 32 32)"/>
    <!-- 300° -->
    <rect x="9.7" y="45.3" width="4" height="5" rx="2" transform="rotate(120 32 32)"/>
    <!-- 330° -->
    <rect x="18.7" y="56.5" width="4" height="5" rx="2" transform="rotate(150 32 32)"/>
    <!-- 360°/0° (top) -->
    <rect x="30" y="60" width="4" height="5" rx="2" transform="rotate(180 32 32)"/>
  </g>

  <!-- Inner dark circle to cover inner half of gear teeth and clean up -->
  <circle cx="32" cy="32" r="23.5" fill="#1F3B5E"/>

  <!-- Thin clock face ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#5CE1E6" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Clock hands: 12:22 -->
  <!-- Hour hand: straight up to y=13 -->
  <line x1="32" y1="32" x2="32" y2="13" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Minute hand: 132° clockwise from up = down-right. End: (48, 45) -->
  <line x1="32" y1="32" x2="48" y2="45" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Green seal badge: top-right -->
  <circle cx="50" cy="14" r="8" fill="#26E698"/>
  <!-- Checkmark -->
  <polyline points="46.5,14.5 49,17 53.5,11.5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
