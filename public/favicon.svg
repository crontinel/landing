<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <!-- Gear teeth: 12 rounded bumps on outer ring -->
  <circle cx="32" cy="5" r="4.5" fill="#0f172a"/>
  <circle cx="43.3" cy="8" r="4.5" fill="#0f172a"/>
  <circle cx="52" cy="16" r="4.5" fill="#0f172a"/>
  <circle cx="56" cy="27" r="4.5" fill="#0f172a"/>
  <circle cx="52" cy="40" r="4.5" fill="#0f172a"/>
  <circle cx="43.3" cy="50" r="4.5" fill="#0f172a"/>
  <circle cx="32" cy="56" r="4.5" fill="#0f172a"/>
  <circle cx="20.7" cy="50" r="4.5" fill="#0f172a"/>
  <circle cx="12" cy="40" r="4.5" fill="#0f172a"/>
  <circle cx="8" cy="27" r="4.5" fill="#0f172a"/>
  <circle cx="12" cy="16" r="4.5" fill="#0f172a"/>
  <circle cx="20.7" cy="8" r="4.5" fill="#0f172a"/>
  <!-- Cyan inner ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#06b6d4" stroke-width="3.5"/>
  <!-- L-hands: 12 o'clock + 3 o'clock -->
  <line x1="32" y1="32" x2="18" y2="22" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="47" y2="23" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#06b6d4"/>
  <!-- Green badge with checkmark -->
  <circle cx="48" cy="14" r="8" fill="#22c55e"/>
  <polyline points="44.5,14 47.2,16.8 51.5,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
