<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark navy background -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <!-- Scalloped clock ring (gear-like edge) -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#06b6d4" stroke-width="3.5" stroke-dasharray="4.5 3.2" stroke-linecap="round"/>
  <!-- Clock center dot -->
  <circle cx="32" cy="32" r="3" fill="#06b6d4"/>
  <!-- L-shaped hands -->
  <line x1="32" y1="32" x2="32" y2="17" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="44" y2="32" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
  <!-- Green badge with checkmark -->
  <circle cx="48" cy="13" r="7" fill="#22c55e"/>
  <polyline points="45,13 47,15.5 51.5,10.5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
