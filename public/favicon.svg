<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#213B5E"/>

  <!-- Arc endpoints at r=27 -->
  <!-- Gear arc (cyan) on LEFT: 11 o'clock (300°) to 5 o'clock (150°) clockwise -->
  <!-- Cyan arc: from 300° to 150° going clockwise through 0° = 300° sweep -->
  <path d="M45.5 8.6 A27 27 0 1 1 8.6 45.5" fill="none" stroke="#4BC6F1" stroke-width="8" stroke-linecap="round"/>
  <!-- Slate arc (smooth) on RIGHT: remaining 60° -->
  <path d="M45.5 8.6 A27 27 0 0 0 8.6 45.5" fill="none" stroke="#6373A1" stroke-width="8" stroke-linecap="round"/>

  <!-- 7 gear teeth on LEFT arc, approx reference positions -->
  <!-- Reference angles: 80, 96, 112, 128, 144, 160, 176 degrees (evenly spaced over 96°) -->
  <!-- All on left hemisphere, r=30 -->
  <circle cx="11" cy="47" r="3.5" fill="#4BC6F1"/>
  <circle cx="11" cy="35" r="3.5" fill="#4BC6F1"/>
  <circle cx="14" cy="23" r="3.5" fill="#4BC6F1"/>
  <circle cx="20" cy="13" r="3.5" fill="#4BC6F1"/>
  <circle cx="28" cy="7" r="3.5" fill="#4BC6F1"/>
  <circle cx="37" cy="8" r="3.5" fill="#4BC6F1"/>
  <circle cx="45" cy="14" r="3.5" fill="#4BC6F1"/>

  <!-- Inner dark circle to clean up -->
  <circle cx="32" cy="32" r="23" fill="#213B5E"/>

  <!-- Clock hands: 12:00 and 4:10 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="45" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Badge at top-right -->
  <circle cx="51" cy="14" r="8" fill="#48E3A6"/>
  <polyline points="47,14.5 50,17.5 55,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
