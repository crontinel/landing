<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background circle -->
  <circle cx="32" cy="32" r="30" fill="#213B5E"/>

  <!-- Gear arc: cyan, thick stroke, ~240° from 11 o'clock around bottom to 5 o'clock -->
  <path d="M43.4 7.5 A27 27 0 1 1 9.9 47.5" fill="none" stroke="#4BC6F1" stroke-width="8" stroke-linecap="round"/>

  <!-- Smooth arc: muted slate, remaining ~120° on right side -->
  <path d="M9.9 47.5 A27 27 0 0 1 43.4 7.5" fill="none" stroke="#6373A1" stroke-width="8" stroke-linecap="round"/>

  <!-- 7 gear teeth as small circles on the cyan arc edge -->
  <circle cx="44" cy="6" r="2.5" fill="#4BC6F1"/>
  <circle cx="57" cy="16" r="2.5" fill="#4BC6F1"/>
  <circle cx="61" cy="32" r="2.5" fill="#4BC6F1"/>
  <circle cx="54" cy="47" r="2.5" fill="#4BC6F1"/>
  <circle cx="39" cy="57" r="2.5" fill="#4BC6F1"/>
  <circle cx="21" cy="55" r="2.5" fill="#4BC6F1"/>
  <circle cx="7" cy="41" r="2.5" fill="#4BC6F1"/>

  <!-- Inner dark circle to clean up arc inner edges -->
  <circle cx="32" cy="32" r="24" fill="#213B5E"/>

  <!-- Clock face ring (subtle) -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#4BC6F1" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Clock hands: 12:00 and 4:10 -->
  <!-- Hour: straight up to y=15 -->
  <line x1="32" y1="32" x2="32" y2="15" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute: 125° down-right. End: (44, 50) -->
  <line x1="32" y1="32" x2="44" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Badge: simple circle (not scalloped — scallops don't render at small sizes anyway) -->
  <circle cx="50" cy="14" r="8" fill="#48E3A6"/>
  <!-- Checkmark -->
  <polyline points="46,14 49,17.5 54,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
