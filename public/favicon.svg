<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#213B5E"/>

  <!-- Arc endpoints at r=27 from center (32,32) — split at 4 o'clock and 8 o'clock -->
  <!-- 8 o'clock: angle 240°, x=32+27*cos(240°)=18.5, y=32+27*sin(240°)=8.6 -->
  <!-- 4 o'clock: angle 60°, x=32+27*cos(60°)=45.5, y=32+27*sin(60°)=55.4 -->
  <!-- Slate arc: 8 o'clock counterclockwise through top to 4 o'clock (120°) -->
  <path d="M18.5 8.6 A27 27 0 0 0 45.5 55.4" fill="none" stroke="#6373A1" stroke-width="8" stroke-linecap="round"/>
  <!-- Cyan arc: 4 o'clock clockwise through bottom to 8 o'clock (300°) -->
  <path d="M45.5 55.4 A27 27 0 1 1 18.5 8.6" fill="none" stroke="#4BC6F1" stroke-width="8" stroke-linecap="round"/>

  <!-- 7 gear teeth: all at r=30 from center, evenly spaced 225° to 345° -->
  <!-- 225°, 255°, 285°, 315°, 345°, 15°, 45° -->
  <circle cx="11" cy="47" r="3.5" fill="#4BC6F1"/>
  <circle cx="11" cy="17" r="3.5" fill="#4BC6F1"/>
  <circle cx="24" cy="7" r="3.5" fill="#4BC6F1"/>
  <circle cx="38" cy="7" r="3.5" fill="#4BC6F1"/>
  <circle cx="47" cy="17" r="3.5" fill="#4BC6F1"/>
  <circle cx="53" cy="32" r="3.5" fill="#4BC6F1"/>
  <circle cx="47" cy="47" r="3.5" fill="#4BC6F1"/>

  <!-- Inner dark circle to clean up arc inner edges, r=23 (doesn't clip teeth at r=30) -->
  <circle cx="32" cy="32" r="23" fill="#213B5E"/>

  <!-- Clock hands: 12:00 and 4:10 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="45" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Badge -->
  <circle cx="51" cy="14" r="8" fill="#48E3A6"/>
  <polyline points="47,14.5 50,17.5 55,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
