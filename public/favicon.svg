<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <!-- Gear teeth: 8 large bumps for clarity at small sizes -->
  <circle cx="32" cy="5" r="5" fill="#0f172a"/>
  <circle cx="44" cy="9" r="5" fill="#0f172a"/>
  <circle cx="54" cy="20" r="5" fill="#0f172a"/>
  <circle cx="56" cy="33" r="5" fill="#0f172a"/>
  <circle cx="48" cy="48" r="5" fill="#0f172a"/>
  <circle cx="36" cy="57" r="5" fill="#0f172a"/>
  <circle cx="20" cy="55" r="5" fill="#0f172a"/>
  <circle cx="8" cy="44" r="5" fill="#0f172a"/>
  <circle cx="6" cy="29" r="5" fill="#0f172a"/>
  <circle cx="14" cy="17" r="5" fill="#0f172a"/>
  <!-- Cyan inner ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#06b6d4" stroke-width="3.5"/>
  <!-- Clock hands: 10:09 -->
  <line x1="32" y1="32" x2="21" y2="26" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="43" y2="26" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#06b6d4"/>
  <!-- Green badge with checkmark -->
  <circle cx="48" cy="14" r="8" fill="#22c55e"/>
  <polyline points="44.5,14 47.2,16.8 51.5,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
