<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#1F3B5E"/>
  <!-- Gear teeth arc (left 75%, cyan) -->
  <path d="M32 4 A28 28 0 1 0 50 50" fill="none" stroke="#5CE1FF" stroke-width="5" stroke-linecap="round"/>
  <!-- Gear teeth on left arc -->
  <circle cx="10" cy="27" r="4" fill="#5CE1FF"/>
  <circle cx="7" cy="37" r="4" fill="#5CE1FF"/>
  <circle cx="12" cy="47" r="4" fill="#5CE1FF"/>
  <circle cx="21" cy="55" r="4" fill="#5CE1FF"/>
  <circle cx="32" cy="58" r="4" fill="#5CE1FF"/>
  <circle cx="43" cy="54" r="4" fill="#5CE1FF"/>
  <circle cx="52" cy="46" r="4" fill="#5CE1FF"/>
  <!-- Smooth arc right side (muted slate) -->
  <path d="M50 50 A28 28 0 0 0 32 4" fill="none" stroke="#5E6F98" stroke-width="5" stroke-linecap="round"/>
  <!-- Clock hands at 12:22 -->
  <line x1="32" y1="32" x2="32" y2="10" stroke="#F0F4F7" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="50" y2="44" stroke="#F0F4F7" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Green seal badge with checkmark -->
  <circle cx="48" cy="14" r="8" fill="#26E698"/>
  <polyline points="44.5,14 47.2,16.8 51.5,11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
