<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#213B5E"/>

  <!-- Arc endpoints at r=27 from center (32,32) -->
  <!-- 4 o'clock: angle 60°, x=45.5, y=55.4 -->
  <!-- 8 o'clock: angle 240°, x=18.5, y=8.6 -->
  <!-- Cyan arc: LEFT+BOTTOM side — 4 o'clock clockwise through bottom+left to 8 o'clock (300°) -->
  <path d="M45.5 55.4 A27 27 0 1 1 18.5 8.6" fill="none" stroke="#4BC6F1" stroke-width="8" stroke-linecap="round"/>
  <!-- Slate arc: RIGHT+TOP side — 4 o'clock counterclockwise through top to 8 o'clock (60°) -->
  <path d="M45.5 55.4 A27 27 0 0 0 18.5 8.6" fill="none" stroke="#6373A1" stroke-width="8" stroke-linecap="round"/>

  <!-- 7 gear teeth: all at r=30, evenly spaced on LEFT+BOTTOM arc (225° to 315°) -->
  <!-- Angles: 225, 255, 285, 315, 345, 15, 45 -->
  <!-- 225°: x=32+30*cos(225°)=32-21.2=10.8, y=32+30*sin(225°)=32+21.2=53.2 -->
  <!-- 255°: x=32+30*cos(255°)=32-7.6=24.4, y=32+30*sin(255°)=32-29.0=3 -->
  <!-- 285°: x=32+30*cos(285°)=32+7.6=39.6, y=32+30*sin(285°)=32-29.0=3 -->
  <!-- 315°: x=32+30*cos(315°)=32+21.2=53.2, y=32+30*sin(315°)=32-21.2=10.8 -->
  <!-- 345°: x=32+30*cos(345°)=32+29.0=61, y=32+30*sin(345°)=32-7.6=24.4 -->
  <!-- 15°: x=32+30*cos(15°)=32+29.0=61, y=32+30*sin(15°)=32+7.8=39.8 -->
  <!-- 45°: x=32+30*cos(45°)=32+21.2=53.2, y=32+30*sin(45°)=32+21.2=53.2 -->
  <circle cx="11" cy="53" r="3.5" fill="#4BC6F1"/>
  <circle cx="24" cy="3" r="3.5" fill="#4BC6F1"/>
  <circle cx="40" cy="3" r="3.5" fill="#4BC6F1"/>
  <circle cx="53" cy="11" r="3.5" fill="#4BC6F1"/>
  <circle cx="61" cy="24" r="3.5" fill="#4BC6F1"/>
  <circle cx="61" cy="40" r="3.5" fill="#4BC6F1"/>
  <circle cx="53" cy="53" r="3.5" fill="#4BC6F1"/>

  <!-- Inner dark circle to clean up arc inner edges -->
  <circle cx="32" cy="32" r="23" fill="#213B5E"/>

  <!-- Clock hands: 12:00 and 4:10 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="45" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Badge at top-right where smooth arc meets gear -->
  <circle cx="51" cy="14" r="8" fill="#48E3A6"/>
  <polyline points="47,14.5 50,17.5 55,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
