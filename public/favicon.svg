<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#213B5E"/>

  <!-- Smooth arc (slate) — top-right quadrant, 4 o'clock to 8 o'clock -->
  <!-- Start: (52, 43) going counterclockwise through top to (12, 43) -->
  <path d="M52 43 A27 27 0 0 0 12 43" fill="none" stroke="#6373A1" stroke-width="8" stroke-linecap="round"/>

  <!-- Gear arc (cyan) — 8 o'clock clockwise around to 4 o'clock -->
  <path d="M12 43 A27 27 0 1 1 52 43" fill="none" stroke="#4BC6F1" stroke-width="8" stroke-linecap="round"/>

  <!-- 7 gear teeth: circles at r=30, evenly spaced on left+bottom arc (225° to 345°) -->
  <!-- 225° = 7 o'clock, 255° = 8 o'clock, 285° = 9 o'clock, 315° = 10 o'clock -->
  <!-- 345° = 11 o'clock, 15° = 1 o'clock (near top-right junction), 45° = 2 o'clock -->
  <circle cx="12" cy="51" r="3.5" fill="#4BC6F1"/>
  <circle cx="19" cy="59" r="3.5" fill="#4BC6F1"/>
  <circle cx="29" cy="61" r="3.5" fill="#4BC6F1"/>
  <circle cx="40" cy="58" r="3.5" fill="#4BC6F1"/>
  <circle cx="48" cy="50" r="3.5" fill="#4BC6F1"/>
  <circle cx="54" cy="39" r="3.5" fill="#4BC6F1"/>
  <circle cx="56" cy="27" r="3.5" fill="#4BC6F1"/>

  <!-- Inner dark circle to clean up inner arc edges -->
  <circle cx="32" cy="32" r="24" fill="#213B5E"/>

  <!-- Clock hands: 12:00 and 4:10 -->
  <!-- Hour: straight up to y=16 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute: down-right. End: (45, 50) -->
  <line x1="32" y1="32" x2="45" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Badge: green circle with checkmark -->
  <circle cx="51" cy="14" r="8" fill="#48E3A6"/>
  <polyline points="47,14.5 50,17.5 55,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
