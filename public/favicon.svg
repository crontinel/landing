<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#1e3a5f"/>
  <!-- Gear ring (cyan) -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#38bdf8" stroke-width="4"/>
  <!-- Gear teeth -->
  <rect x="30" y="8" width="4" height="6" rx="1" fill="#38bdf8"/>
  <rect x="30" y="50" width="4" height="6" rx="1" fill="#38bdf8"/>
  <rect x="8" y="30" width="6" height="4" rx="1" fill="#38bdf8"/>
  <rect x="50" y="30" width="6" height="4" rx="1" fill="#38bdf8"/>
  <rect x="13.5" y="13.5" width="6" height="4" rx="1" fill="#38bdf8" transform="rotate(45 16.5 15.5)"/>
  <rect x="44.5" y="13.5" width="6" height="4" rx="1" fill="#38bdf8" transform="rotate(-45 47.5 15.5)"/>
  <rect x="13.5" y="46.5" width="6" height="4" rx="1" fill="#38bdf8" transform="rotate(-45 16.5 48.5)"/>
  <rect x="44.5" y="46.5" width="6" height="4" rx="1" fill="#38bdf8" transform="rotate(45 47.5 48.5)"/>
  <!-- Clock face -->
  <circle cx="32" cy="32" r="14" fill="#1e3a5f"/>
  <!-- Clock hands (white) -->
  <line x1="32" y1="32" x2="25" y2="23" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="39" y2="29" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="2" fill="#38bdf8"/>
  <!-- Checkmark badge (mint, top-right) -->
  <circle cx="46" cy="17" r="8" fill="#10b981"/>
  <path d="M42 17l3 3 5-5" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
