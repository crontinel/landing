<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background r=32 -->
  <circle cx="32" cy="32" r="32" fill="#213B5E"/>

  <!-- Arc endpoints at r=27 -->
  <!-- 11 o'clock (300°): x=45.5, y=8.6 | 5 o'clock (150°): x=8.6, y=45.5 -->

  <!-- Slate arc (smooth): small CCW from 11 through top to 5 -->
  <path d="M45.5 8.6 A27 27 0 0 0 8.6 45.5" fill="none" stroke="#6373A1" stroke-width="8" stroke-linecap="round"/>

  <!-- Cyan arc (gear): large CW from 11 through bottom+left to 5 -->
  <path d="M45.5 8.6 A27 27 0 1 1 8.6 45.5" fill="none" stroke="#4BC6F1" stroke-width="8" stroke-linecap="round"/>

  <!-- 7 gear teeth at r=28, computed from angles 120° to 180° -->
  <circle cx="18" cy="56" r="2.5" fill="#4BC6F1"/>
  <circle cx="14" cy="53" r="2.5" fill="#4BC6F1"/>
  <circle cx="11" cy="50" r="2.5" fill="#4BC6F1"/>
  <circle cx="8" cy="46" r="2.5" fill="#4BC6F1"/>
  <circle cx="6" cy="42" r="2.5" fill="#4BC6F1"/>
  <circle cx="4" cy="37" r="2.5" fill="#4BC6F1"/>
  <circle cx="4" cy="32" r="2.5" fill="#4BC6F1"/>

  <!-- Inner dark circle r=23 -->
  <circle cx="32" cy="32" r="23" fill="#213B5E"/>

  <!-- Clock hands: 12:00 and 4:10 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="45" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Badge at top-right -->
  <circle cx="51" cy="14" r="8" fill="#48E3A6"/>
  <polyline points="47,14.5 50,17.5 55,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
