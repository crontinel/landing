<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <circle cx="32" cy="32" r="30" fill="#213B5E"/>

  <!-- Arc endpoints at r=27: 1 o'clock and 8 o'clock -->
  <!-- Slate arc (smooth): small CCW arc from 1 to 8 through top -->
  <path d="M56.4 14.6 A27 27 0 0 0 8.6 45.5" fill="none" stroke="#6373A1" stroke-width="8" stroke-linecap="round"/>
  <!-- Cyan arc (gear): large CW arc from 8 to 1 through bottom+left -->
  <path d="M8.6 45.5 A27 27 0 1 1 56.4 14.6" fill="none" stroke="#4BC6F1" stroke-width="8" stroke-linecap="round"/>

  <!-- 7 gear teeth at r=30 on LEFT hemisphere (90° to 270°) -->
  <!-- 90°: (32, 62), 120°: (17, 58), 150°: (6, 47), 180°: (2, 32) -->
  <!-- 210°: (6, 17), 240°: (17, 6), 270°: (32, 2) -->
  <circle cx="32" cy="62" r="3.5" fill="#4BC6F1"/>
  <circle cx="17" cy="58" r="3.5" fill="#4BC6F1"/>
  <circle cx="6" cy="47" r="3.5" fill="#4BC6F1"/>
  <circle cx="2" cy="32" r="3.5" fill="#4BC6F1"/>
  <circle cx="6" cy="17" r="3.5" fill="#4BC6F1"/>
  <circle cx="17" cy="6" r="3.5" fill="#4BC6F1"/>
  <circle cx="32" cy="2" r="3.5" fill="#4BC6F1"/>

  <!-- Inner dark circle r=23 (teeth at r=30 are outside this, fully visible) -->
  <circle cx="32" cy="32" r="23" fill="#213B5E"/>

  <!-- Clock hands: 12:00 and 4:10 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="45" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Badge at top-right -->
  <circle cx="51" cy="14" r="8" fill="#48E3A6"/>
  <polyline points="47,14.5 50,17.5 55,11" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
