name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install wrangler v3
        run: npm install -g wrangler@3.90.0

      - name: Install dependencies
        run: npm ci --ignore-engines

      - name: Build
        run: npm run build

      - name: Create wrangler.toml
        run: |
          cat > wrangler.toml << 'EOF'
          name = "crontinel-landing"
          compatibility_date = "2026-04-05"
          main = "dist/server/entry.mjs"
          assets = { directory = "dist/client" }
          EOF

      - name: Deploy to Cloudflare Workers
        env:
          CF_API_KEY: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --legacy-env
