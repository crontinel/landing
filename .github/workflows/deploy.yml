name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Pin to Node.js 22 LTS - GitHub runners will default to Node 24 on June 2 2026
      # Node 20 removed Sept 16 2026; this ensures actions/checkout and actions/setup-node stay on LTS
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'false'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA_MEASUREMENT_ID }}
          PUBLIC_BING_VERIFICATION_CODE: ${{ secrets.PUBLIC_BING_VERIFICATION_CODE }}
      - name: Ensure .assetsignore excludes _worker.js
        run: |
          echo "_worker.js" > dist/.assetsignore
          echo "_worker.js/**" >> dist/.assetsignore

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.56.0'
          command: deploy
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}

      - name: Purge Cloudflare cache for the landing site
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ['CLOUDFLARE_API_TOKEN']
          zone_name = 'crontinel.com'
          files = [
              'https://crontinel.com/',
              'https://crontinel.com/robots.txt',
              'https://crontinel.com/sitemap.xml',
          ]

          req = urllib.request.Request(
              f'https://api.cloudflare.com/client/v4/zones?name={zone_name}&status=active&per_page=1',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json',
              },
          )
          with urllib.request.urlopen(req) as resp:
              payload = json.load(resp)

          if not payload.get('success') or not payload.get('result'):
              raise SystemExit(f'Unable to resolve Cloudflare zone for {zone_name}: {payload}')

          zone_id = payload['result'][0]['id']
          purge_req = urllib.request.Request(
              f'https://api.cloudflare.com/client/v4/zones/{zone_id}/purge_cache',
              data=json.dumps({'files': files}).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          with urllib.request.urlopen(purge_req) as resp:
              purge_payload = json.load(resp)

          if not purge_payload.get('success'):
              raise SystemExit(f'Cloudflare purge failed: {purge_payload}')

          print(f'Purged Cloudflare cache for {zone_name}: {", ".join(files)}')
          PY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
